<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autoresearch — youtube-to-steps</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #333; padding: 24px; }
  h1 { font-size: 1.4rem; font-weight: 600; color: #1a1a2e; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
  .status-bar { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
  .stat { background: white; border-radius: 10px; padding: 16px 20px; min-width: 140px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .stat-label { font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .stat-value { font-size: 1.6rem; font-weight: 700; color: #1a1a2e; }
  .stat-value.green { color: #2ecc71; }
  .stat-value.blue { color: #3498db; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
  .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .card h2 { font-size: 0.9rem; font-weight: 600; color: #555; margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
  .chart-wrap { position: relative; height: 200px; }
  .eval-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 0.85rem; }
  .eval-name { flex: 1; color: #555; }
  .eval-bar-wrap { width: 120px; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
  .eval-bar { height: 100%; background: #a8d8ea; border-radius: 4px; transition: width 0.4s; }
  .eval-pct { width: 36px; text-align: right; color: #888; font-size: 0.8rem; }
  table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  th { text-align: left; padding: 8px 10px; color: #999; font-weight: 500; font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid #f0f0f0; }
  td { padding: 9px 10px; border-bottom: 1px solid #f7f7f7; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
  .badge.baseline { background: #dbeafe; color: #2563eb; }
  .badge.keep { background: #d1fae5; color: #059669; }
  .badge.discard { background: #fee2e2; color: #dc2626; }
  .badge.running { background: #fef3c7; color: #d97706; }
  .current-status { background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 12px 16px; margin-bottom: 24px; font-size: 0.85rem; color: #92400e; }
  .complete-banner { background: #d1fae5; border: 1px solid #6ee7b7; border-radius: 8px; padding: 12px 16px; margin-bottom: 24px; font-size: 0.85rem; color: #065f46; }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<h1>Autoresearch Dashboard — youtube-to-steps</h1>
<p class="subtitle">Auto-refreshes every 10 seconds &bull; Optimizing <code>gemini_auto_prompt.txt</code></p>

<div id="status-banner" class="current-status">Loading...</div>

<div class="status-bar">
  <div class="stat"><div class="stat-label">Experiments</div><div class="stat-value blue" id="exp-count">0</div></div>
  <div class="stat"><div class="stat-label">Baseline</div><div class="stat-value" id="baseline-pct">—</div></div>
  <div class="stat"><div class="stat-label">Best Score</div><div class="stat-value green" id="best-pct">—</div></div>
  <div class="stat"><div class="stat-label">Improvement</div><div class="stat-value green" id="improvement">—</div></div>
</div>

<div class="grid">
  <div class="card">
    <h2>Score Progression</h2>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>
  <div class="card">
    <h2>Eval Breakdown</h2>
    <div id="eval-breakdown"></div>
  </div>
</div>

<div class="card">
  <h2>Experiment Log</h2>
  <table>
    <thead><tr><th>#</th><th>Score</th><th>Pass Rate</th><th>Status</th><th>Description</th></tr></thead>
    <tbody id="exp-table"></tbody>
  </table>
</div>

<script>
let chart = null;

function pct(n, d) { return d === 0 ? '0%' : (n/d*100).toFixed(1) + '%'; }

async function refresh() {
  let data;
  try {
    const r = await fetch('results.json?t=' + Date.now());
    data = await r.json();
  } catch(e) { return; }

  // Status banner
  const banner = document.getElementById('status-banner');
  if (data.status === 'complete') {
    banner.className = 'complete-banner';
    banner.textContent = '✓ Autoresearch complete — final results below.';
  } else {
    banner.className = 'current-status';
    banner.textContent = data.experiments.length === 0
      ? 'Running experiment 0 (baseline)...'
      : `Running experiment ${data.current_experiment}...`;
  }

  // Stats
  document.getElementById('exp-count').textContent = data.experiments.length;
  const baseline = data.baseline_score;
  const maxScore = data.experiments[0]?.max_score ?? 25;
  if (baseline !== null) {
    document.getElementById('baseline-pct').textContent = (baseline/maxScore*100).toFixed(1) + '%';
  }
  if (data.best_score !== null) {
    const bestPct = (data.best_score/maxScore*100).toFixed(1) + '%';
    document.getElementById('best-pct').textContent = bestPct;
    if (baseline !== null) {
      const delta = ((data.best_score - baseline)/maxScore*100).toFixed(1);
      document.getElementById('improvement').textContent = (delta >= 0 ? '+' : '') + delta + '%';
    }
  }

  // Chart
  const labels = data.experiments.map(e => 'E' + e.id);
  const scores = data.experiments.map(e => (e.score/e.max_score*100).toFixed(1));
  const colors = data.experiments.map(e =>
    e.status === 'baseline' ? '#93c5fd' : e.status === 'keep' ? '#6ee7b7' : '#fca5a5'
  );
  if (!chart) {
    chart = new Chart(document.getElementById('chart'), {
      type: 'bar',
      data: { labels, datasets: [{ data: scores, backgroundColor: colors, borderRadius: 4 }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { min: 0, max: 100, ticks: { callback: v => v + '%' }, grid: { color: '#f0f0f0' } },
          x: { grid: { display: false } }
        }
      }
    });
  } else {
    chart.data.labels = labels;
    chart.data.datasets[0].data = scores;
    chart.data.datasets[0].backgroundColor = colors;
    chart.update();
  }

  // Eval breakdown
  const eb = document.getElementById('eval-breakdown');
  eb.innerHTML = data.eval_breakdown.map(e => {
    const p = e.total === 0 ? 0 : Math.round(e.pass_count / e.total * 100);
    return `<div class="eval-row">
      <span class="eval-name">${e.name}</span>
      <div class="eval-bar-wrap"><div class="eval-bar" style="width:${p}%"></div></div>
      <span class="eval-pct">${p}%</span>
    </div>`;
  }).join('');

  // Table
  const tbody = document.getElementById('exp-table');
  tbody.innerHTML = [...data.experiments].reverse().map(e => `
    <tr>
      <td>${e.id}</td>
      <td>${e.score}/${e.max_score}</td>
      <td>${(e.score/e.max_score*100).toFixed(1)}%</td>
      <td><span class="badge ${e.status}">${e.status}</span></td>
      <td>${e.description}</td>
    </tr>`).join('');
}

refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
